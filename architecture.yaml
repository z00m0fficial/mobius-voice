repository: mobius-voice
version: 1.0.0
status: foundation
classification: internal-platform
primary_layer: audio-intelligence
department: Sonic
mission: Transform every spoken interaction into verified organizational intelligence.
capabilities:
  - audio-capture
  - transcription
  - cleanup
  - multilingual-intake
  - dialect-understanding
  - speaker-diarization
  - consent-based-speaker-verification
  - meeting-intelligence
